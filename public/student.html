<!DOCTYPE html>
<html>
<head>
    <title>SilentPrint Student</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .pending { color: red; font-weight: bold; }
        .completed { color: green; font-weight: bold; }
    </style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h3>Smart Xerox Ordering System</h3>

    <div class="card">

        <h2>Upload Print Order</h2>

        <form id="uploadForm">

            <input type="file" name="file" required>

            <input type="number" name="copies" placeholder="Copies" required>

            <select name="color">
                <option>Black & White</option>
                <option>Color</option>
            </select>

            <select name="side">
                <option>Single</option>
                <option>Double</option>
            </select>

            <button type="submit">Place Order</button>

        </form>

    </div>

    <h2>Your Orders</h2>

    <div id="orders"></div>

</div>

<script>

const form = document.getElementById("uploadForm")

form.addEventListener("submit", async (e) => {

    e.preventDefault()

    const formData = new FormData(form)

    await fetch("/upload", {
        method: "POST",
        body: formData
    })

    alert("Order placed successfully")
    form.reset()
    loadOrders()
})

async function loadOrders() {

    const res = await fetch("/orders")
    const orders = await res.json()

    let html = ""

    orders.forEach(order => {

        let statusClass = order.status === "Completed"
            ? "completed"
            : "pending"

        html += `
        <div class="order">
            <p><b>Order ID:</b> ${order.id}</p>
            <p><b>File:</b> ${order.file}</p>
            <p class="${statusClass}">
                Status: ${order.status}
            </p>
        </div>
        `
    })

    document.getElementById("orders").innerHTML = html
}

loadOrders()

</script>

</body>
</html>
