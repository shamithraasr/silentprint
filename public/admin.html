<!DOCTYPE html>
<html>
<head>
    <title>SilentPrint Admin</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .pending {
            color: red;
            font-weight: bold;
        }

        .completed {
            color: green;
            font-weight: bold;
        }

        .open-btn {
            background: #333;
            margin-top: 5px;
        }

        .complete-btn {
            background: green;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h2>Admin Panel</h2>

    <div id="orders"></div>

</div>

<script>

async function loadOrders() {

    const res = await fetch("/orders")
    const orders = await res.json()

    let html = ""

    orders.forEach(order => {

        let statusClass = order.status === "Completed" ? "completed" : "pending"

        html += `
        <div class="order">

            <p><b>Order ID:</b> ${order.id}</p>

            <p><b>Copies:</b> ${order.copies}</p>
            <p><b>Color:</b> ${order.color}</p>
            <p><b>Side:</b> ${order.side}</p>

            <p class="${statusClass}">
                Status: ${order.status}
            </p>

            <a href="/uploads/${order.file}" target="_blank">
                <button class="open-btn">Open File</button>
            </a>

            <button class="complete-btn"
                onclick="updateStatus(${order.id})">
                Mark Completed
            </button>

        </div>
        `
    })

    document.getElementById("orders").innerHTML = html
}

async function updateStatus(id) {

    await fetch("/update-status", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            status: "Completed"
        })
    })

    loadOrders()
}

loadOrders()

</script>

</body>
</html>
