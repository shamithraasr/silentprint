<!DOCTYPE html>
<html>

<head>
    <title>SilentPrint Student</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 95%;
            max-width: 400px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, select, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }

        button {
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        h3 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <center>
        <h2>SilentPrint</h2>
        <p>Smart Xerox Ordering System</p>
    </center>

    <div class="card">

        <h3>Upload Print Order</h3>

        <input type="file" id="file">
        <input type="number" id="copies" placeholder="Copies">

        <select id="color">
            <option>Black & White</option>
            <option>Color</option>
        </select>

        <select id="side">
            <option>Single</option>
            <option>Double</option>
        </select>

        <button onclick="placeOrder()">Place Order</button>

    </div>

</div>

<script>

async function placeOrder() {

    let file = document.getElementById("file").files[0]
    let copies = document.getElementById("copies").value
    let color = document.getElementById("color").value
    let side = document.getElementById("side").value

    if (!file || !copies) {
        alert("Please select file and copies")
        return
    }

    let formData = new FormData()
    formData.append("file", file)
    formData.append("copies", copies)
    formData.append("color", color)
    formData.append("side", side)

    let res = await fetch("/upload", {
        method: "POST",
        body: formData
    })

    let data = await res.json()

    alert(data.message)
}

</script>

</body>
</html>
